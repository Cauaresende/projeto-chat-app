<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat app</title>
  <link rel="shortcut icon" href="estilos/images/favicon-32x32.png" type="image/x-icon">
  <link rel="stylesheet" href="estilos/css/style.css">
  <script src="https://kit.fontawesome.com/ff092b6afc.js" crossorigin="anonymous"></script>
</head>
<body>
  <main>
    <div class="detalhe-iphone"></div>
    <section class="borda-celular">
        <section class="celular">
          <div class="apresentacao">
            <div class="apresentacao-esquerda">
              <i class="fa-solid fa-chevron-left"></i>
              <img src="estilos/images/avatar.jpg" width="30px" alt="avatar">
              <div class="descricao">
                <h2>Samuel Green</h2>
                <p>Available to walk</p>
              </div>
            </div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </div>
          <div class="conteudo">
              <p class="escrita-roxo">That sounds great. I’d be happy with that.</p>
              <p class="escrita-roxo">Could you send over some pictures of your dog, please?</p>
            <div class="img-dog">
              <img src="estilos/images/dog-image-1.jpg" alt="img-dog1">
              <img src="estilos/images/dog-image-2.jpg" alt="img-dog2">
              <img src="estilos/images/dog-image-3.jpg" alt="img-dog3">
            </div>
              <p class="escrita-cinza">Here are a few pictures. She’s a happy girl!</p>
              <p class="escrita-cinza">Can you make it?</p>
              <p class="escrita-roxo">She looks so happy! The time we discussed works. How long shall I take her out for?</p>
          </div>
        </section>
    </section>
  </main>
</body>
</html>
